name: Flira Backend CI

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches:
      - develop
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'

jobs:
  build-and-test:
    name: Build and Test Backend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore backend/Flira.slnx

    - name: Build Solution
      run: dotnet build backend/Flira.slnx --configuration Release --no-restore /p:TreatWarningsAsErrors=true

    - name: Run Tests
      run: dotnet test backend/Flira.slnx --configuration Release --no-build
