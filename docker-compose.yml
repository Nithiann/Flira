services:
  postgres:
    image: postgres:15-alpine
    container_name: flira_postgres
    environment:
      POSTGRES_DB: flira_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: flira_api
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flira_api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=flira_db;Username=postgres;Password=postgres
      - JwtSettings__Issuer=FliraApi
      - JwtSettings__Audience=FliraClient
      - JwtSettings__Key=SuperSecretKeyForFliraSecurityMustBeAtLeast32CharactersLong!
    depends_on:
      - postgres

  frontend:
    image: flira_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flira_frontend
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  postgres_data:
